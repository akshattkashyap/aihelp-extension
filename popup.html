<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI Text Lookup Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        background: #ffffff;
        width: 300px;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 {
        font-size: 16px;
        color: #1a1a1a;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1 img {
        width: 20px;
        height: 20px;
      }
      p {
        color: #666;
        font-size: 13px;
        line-height: 1.4;
      }
      label {
        display: block;
        font-weight: 500;
        color: #333;
        font-size: 13px;
      }
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 10px;
        padding-right: 40px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
        transition: border-color 0.2s;
      }
      input[type="password"]:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: #1a73e8;
      }
      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .toggle-password {
        position: absolute;
        right: 8px;
        background: transparent;
        border: none;
        width: auto;
        padding: 4px;
        color: #666;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .toggle-password:hover {
        background: transparent;
        color: #333;
      }
      .toggle-password svg {
        display: block;
      }
      button {
        width: 100%;
        background: #1a73e8;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #1557b0;
      }
      .status {
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        display: none;
        text-align: center;
      }
      .status.success {
        display: block;
        background: #e6f4ea;
        color: #1e7e34;
      }
      .status.error {
        display: block;
        background: #fce8e6;
        color: #c5221f;
      }
      a {
        color: #1a73e8;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><img src="assets/images/icon16.png" alt="Icon" /> AI Text Lookup</h1>
      <p>
        Enter your Groq API key to enable AI explanations. Get one free at
        <a href="https://console.groq.com/keys" target="_blank">Groq</a>.
      </p>

      <label for="apiKey">Groq API Key</label>
      <div class="input-wrapper">
        <input type="password" id="apiKey" placeholder="gsk_..." />
        <button
          id="togglePasswordBtn"
          class="toggle-password"
          type="button"
          aria-label="Toggle password visibility"
        >
          <svg
            id="eyeIcon"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg
            id="eyeOffIcon"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="display: none"
          >
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
            ></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>

      <button id="saveBtn">Save API Key</button>

      <div id="status" class="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
