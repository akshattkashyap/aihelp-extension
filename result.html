<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI Text Lookup Result</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #ffffff;
        color: #444444;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 16px 12px 16px;
      }
      .title-container {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
        line-height: 1.3;
      }
      .content {
        flex: 1;
        padding: 0 16px 12px 16px;
        font-size: 14px;
        line-height: 1.6;
        overflow-y: auto;
      }
      .footer {
        display: flex;
        justify-content: flex-end;
        padding: 8px 16px 14px 16px;
      }
      .more-link {
        font-size: 13px;
        color: #1a73e8;
        text-decoration: none;
        cursor: pointer;
        font-weight: 500;
        transition: color 0.15s ease;
      }
      .more-link:hover {
        color: #1557b0;
      }
      .spinner {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #666666;
      }
      .spinner-circle {
        width: 16px;
        height: 16px;
        border: 2px solid #e0e0e0;
        border-top-color: #1a73e8;
        border-radius: 50%;
        animation: ai-lookup-spin 0.8s linear infinite;
      }
      @keyframes ai-lookup-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title-container" id="titleText">Loading...</div>
    </div>
    <div class="content" id="ai-lookup-content">
      <div class="spinner">
        <div class="spinner-circle"></div>
        <span>Getting AI response...</span>
      </div>
    </div>
    <div class="footer">
      <a href="#" class="more-link" id="moreLink">More »</a>
    </div>
    <script src="result.js"></script>
  </body>
</html>
